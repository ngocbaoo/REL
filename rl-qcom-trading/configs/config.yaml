# ============================================================
# REL301m — QCOM RL Trading Agent config
# Student: Ta Bao Ngoc (HE191387) — Assigned stock: QCOM
# ============================================================

data:
  train_csv: data/qcom_train.csv
  test_csv: data/qcom_test.csv

env:
  lookback_window: 10
  total_assets_initial: 100000.0      # TOTAL_ASSETS_INITIAL (vốn khởi điểm)
  b_min: 0.27                          # B_MIN
  b_max: 0.62                          # B_MAX
  sell_min: 0.08                       # SELL_MIN
  sell_max: 0.88                       # SELL_MAX
  transaction_fee: 0.03                # TRANSACTION_FEE
  transaction_session: 32              # TRANSACTION_SESSION (số phiên liên tiếp không trade trước khi bị phạt)
  transaction_penalty: 2567.0          # TRANSACTION_PENALTY (USD, trừ thẳng vào tiền mặt)
  total_assets_threshold: 100000.0     # thua nếu tổng tài sản < ngưỡng này
  cash_floor: -5000.0                  # thua nếu tiền mặt <= ngưỡng này
  win_target: 1000000.0                # thắng nếu tổng tài sản đạt ngưỡng này
  price_mode: close                    # close | avg_close_high | prev_day_high
  episode_length: 120                   # sub-window length (~6 tháng) để đa dạng hoá episode, tránh nhớ 1 quỹ đạo bull
  random_start: true                    # random điểm bắt đầu mỗi episode (chỉ khi episode_length set)

a2c:
  gamma: 0.99
  gae_lambda: 0.95
  lr: 0.0007
  n_steps: 32                           # độ dài rollout mỗi lần cập nhật (on-policy)
  value_coef: 0.5
  entropy_coef: 0.01                    # entropy bonus -> chống suy biến all-buy/all-hold
  max_grad_norm: 0.5
  hidden_sizes: [128, 128]
  weight_decay: 0.00001

train:
  total_timesteps: 200000
  seed: 42
  eval_freq_episodes: 10
  validation_months: 6                  # last N months of train set used as validation slice
  log_dir: outputs/logs
  checkpoint_dir: outputs/checkpoints
  device: auto                          # auto | cpu | cuda
